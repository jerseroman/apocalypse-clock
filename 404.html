<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>404 | Apocalypse Clock</title>
  <meta name="description" content="404 page.">

  <style>
    :root {
      --bg: #000000;
      --text: #f5f5f5;
      --muted: #8a8a8a;
      --line: #2a2a2a;
      --accent: #d63b3b;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      width: 100%;
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .wrap {
      text-align: center;
      padding: 32px;
      max-width: 700px;
    }

    .clock {
      position: relative;
      width: 150px;
      height: 150px;
      margin: 0 auto 34px;
      border: 2px solid var(--line);
      border-radius: 50%;
      box-shadow:
        0 0 0 1px rgba(255, 255, 255, 0.03),
        0 0 40px rgba(255, 255, 255, 0.04);
    }

    .clock::before {
      content: "";
      position: absolute;
      width: 8px;
      height: 8px;
      background: var(--text);
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 3;
    }

    .hand {
      position: absolute;
      left: 50%;
      bottom: 50%;
      transform-origin: bottom center;
      border-radius: 999px;
    }

    .hour {
      width: 4px;
      height: 40px;
      background: var(--text);
      margin-left: -2px;
      transform: rotate(310deg);
    }

    .minute {
      width: 2px;
      height: 56px;
      background: var(--accent);
      margin-left: -1px;
      animation: tick 6s linear infinite;
    }

    @keyframes tick {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .mark {
      position: absolute;
      width: 2px;
      height: 10px;
      background: var(--line);
      left: 50%;
      top: 6px;
      transform-origin: 50% 69px;
      margin-left: -1px;
    }

    .mark:nth-child(1) {
      transform: rotate(0deg);
    }

    .mark:nth-child(2) {
      transform: rotate(30deg);
    }

    .mark:nth-child(3) {
      transform: rotate(60deg);
    }

    .mark:nth-child(4) {
      transform: rotate(90deg);
    }

    .mark:nth-child(5) {
      transform: rotate(120deg);
    }

    .mark:nth-child(6) {
      transform: rotate(150deg);
    }

    .mark:nth-child(7) {
      transform: rotate(180deg);
    }

    .mark:nth-child(8) {
      transform: rotate(210deg);
    }

    .mark:nth-child(9) {
      transform: rotate(240deg);
    }

    .mark:nth-child(10) {
      transform: rotate(270deg);
    }

    .mark:nth-child(11) {
      transform: rotate(300deg);
    }

    .mark:nth-child(12) {
      transform: rotate(330deg);
    }

    .code {
      margin-top: 4px;
      margin-bottom: 12px;
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    h1 {
      margin: 0 0 14px;
      font-size: clamp(32px, 6vw, 54px);
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    p {
      margin: 0 auto 28px;
      max-width: 520px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.7;
    }

    .actions {
      display: flex;
      justify-content: center;
    }

    a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 170px;
      min-height: 44px;
      padding: 0 18px;
      color: var(--text);
      text-decoration: none;
      border: 1px solid rgba(214, 59, 59, 0.4);
      background: rgba(214, 59, 59, 0.08);
      letter-spacing: 0.08em;
      font-size: 13px;
      transition:
        background 0.2s ease,
        border-color 0.2s ease,
        transform 0.2s ease;
    }

    a:hover {
      background: rgba(214, 59, 59, 0.14);
      border-color: rgba(214, 59, 59, 0.65);
      transform: translateY(-1px);
    }

    a:active {
      transform: translateY(0);
    }

    @media (max-width: 480px) {
      .clock {
        width: 130px;
        height: 130px;
        margin-bottom: 28px;
      }

      .hour {
        height: 34px;
      }

      .minute {
        height: 48px;
      }

      .mark {
        transform-origin: 50% 59px;
      }

      p {
        font-size: 15px;
      }
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="clock" aria-hidden="true">
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>
      <div class="mark"></div>

      <div class="hand hour"></div>
      <div class="hand minute"></div>
    </div>

    <div class="code">404</div>

    <h1>Lost in space and time?</h1>

    <p>
      The page you are looking for has drifted beyond the visible horizon.
      Return to Apocalypse Clock and continue from the present moment.
    </p>

    <div class="actions">
      <a href="https://www.apocalypseclock.com/">GO BACK</a>
    </div>
  </main>
</body>
</html>
